<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CALCULATOR</title>
    <style>
      .css-cost-input {
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ccc;
        margin-right: 10px;
      }
      .css-calculate-bn {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .js-result-total {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h3>Shipping Calculator</h3>
    <p>Orders under 40$ = +5$ shipping</p>
    <p>Orders over 40$ = Free shipping</p>
    <input
      type="number"
      class="order-amount css-cost-input"
      placeholder="Enter order amount"
      onkeydown="Enterkey(event)"
    />
    <button onclick="Calculate()" class="css-calculate-bn">Calculate</button>
    <p class="js-result-total"></p>
    <script>
      function Calculate() {
        const orderAmount = document.querySelector(".order-amount");
        let cost = orderAmount.value;
        if (cost < 40) {
          cost = cost++ + 5;
          document.querySelector(".js-result-total").innerHTML =
            `TOTAL: $${cost}`;
        } else {
          document.querySelector(".js-result-total").innerHTML =
            `TOTAL: $${cost}`;
        }
      }
      function Enterkey(event) {
        if (event.key === "Enter") {
          Calculate();
        }
      }
    </script>
  </body>
</html>
