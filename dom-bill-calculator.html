<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CALCULATOR</title>
    <style>
      .css-cost-input {
        font-size: 16px;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 20px;
        text-align: center;
        border-radius: 10px;
      }
      .css-calculate-bn {
        background-color: rgb(0, 0, 0);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>
  <body>
    <h3>Shipping Calculator</h3>
    <p>Orders under 40$ = +5$ shipping</p>
    <p>Orders over 40$ = Free shipping</p>
    <input
      type="number"
      class="order-amount  css-cost-input"
      placeholder="Enter order amount"
      onkeydown="Enterkey(event)"
    />
    <button onclick="Calculate()"
    class="css-calculate-bn">Calculate</button>
    <p class="js-result-total"></p>
    <script>
      function Calculate() {
        const orderAmount = document.querySelector(".order-amount");
        let cost = orderAmount.value;
        if (cost < 40) {
          cost = cost++ + 5;
          document.querySelector(".js-result-total").innerHTML =
            `TOTAL: $${cost}`;
        } else {
          document.querySelector(".js-result-total").innerHTML =
            `TOTAL: $${cost}`;
        }
      }
      function Enterkey(event) {
        if (event.key === "Enter") {
          Calculate();
        }
      }
    </script>
  </body>
</html>
