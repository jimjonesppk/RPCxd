<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPC V2</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background-color: rgb(25, 25, 25);
        color: white;
      }
      .css-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 18px;
      }
      .choice-btn {
        position: relative;
        display: inline-block;
        width: 120px;
        height: 125px;
        margin: 10px;
        padding-top: 5px;
        cursor: pointer;
        border-radius: 30%;
        border: 4px solid #555;
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        background-color: #333;
      }
      .choice-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
      }
      .choice-btn:active {
        transform: scale(0.95);
      }
      .choice-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        transform: scale(5.6);
      }
      .reset-btn {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #ff4444;
        color: white;
        border: none;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h3 class="css-title">PICK ROCK PAPER SCISSORS</h3>
    <div class="choice-btn rock-btn" onclick="playGame('Rock')">
      <img src="Assets\rng3.png" alt="Rock" />
    </div>
    <div class="choice-btn paper-btn" onclick="playGame('Paper')">
      <img src="Assets\rng2.png" alt="Paper" />
    </div>
    <div class="choice-btn scissors-btn" onclick="playGame('Scissors')">
      <img src="Assets\rng1.png" alt="Scissors" />
    </div>

    <p class="js-result"></p>
    <p class="js-state"></p>
    <p class="js-score"></p>

    <button class="reset-btn" onclick="resetScore()">RESET SCORE</button>

    <script>
      let score = JSON.parse(localStorage.getItem("scoresc")) || {
        userWins: 0,
        compWins: 0,
        Ties: 0,
      };
      displayScore();

      function playGame(role) {
        const compMoveSysin = rngMove();

        let state = "";

        if (role === compMoveSysin) {
          state = "Tie";
          score.Ties += 1;
        } else if (
          (role === "Rock" && compMoveSysin === "Scissors") ||
          (role === "Paper" && compMoveSysin === "Rock") ||
          (role === "Scissors" && compMoveSysin === "Paper")
        ) {
          state = "Win";
          score.userWins += 1;
        } else {
          state = "Lose";
          score.compWins += 1;
        }

        localStorage.setItem("scoresc", JSON.stringify(score));
        displayScore();

        document.querySelector(".js-state").innerHTML =
          `You picked ${role} - God picked ${compMoveSysin},`;

        document.querySelector(".js-result").innerHTML = `You ${state}!`;
      }

      function rngMove() {
        const RNGpc = Math.random();

        let compMove = "";
        if (RNGpc >= 0 && RNGpc < 1 / 3) {
          compMove = "Rock";
        } else if (RNGpc >= 1 / 3 && RNGpc < 2 / 3) {
          compMove = "Paper";
        } else {
          compMove = "Scissors";
        }

        return compMove;
      }

      function resetScore() {
        score.userWins = 0;
        score.compWins = 0;
        score.Ties = 0;
        localStorage.removeItem("scoresc");
        displayScore();
      }

      function displayScore() {
        document.querySelector(".js-score").innerHTML =
          `Wins: ${score.userWins} | Losses: ${score.compWins} | Ties: ${score.Ties}`;
      }
    </script>
  </body>
</html>
