<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPC V2</title>
    <link rel="stylesheet" href="dom-rng-v2.css" />
  </head>
  <body>
    <h3 class="css-title">PICK ROCK PAPER SCISSORS</h3>
    <div class="choice-btn img-btn" onclick="playGame('Rock')">
      <img src="Assets\Rock.png" alt="Rock" />
    </div>
    <div class="choice-btn img-btn" onclick="playGame('Paper')">
      <img src="Assets\Paper.png" alt="Paper" />
    </div>
    <div class="choice-btn img-btn" onclick="playGame('Scissors')">
      <img src="Assets\Scissors.png" alt="Scissors" />
    </div>

    <p class="js-result css-result"></p>
    <p class="js-state"></p>
    <p class="js-score"></p>

    <button class="reset-btn" onclick="resetScore()">RESET SCORE</button>

    <script src="dom-rng-v2.js"></script>
  </body>
</html>
